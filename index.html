<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Durendal</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0C1117">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--olive-900:#1a1f16;--olive-800:#252b1e;--olive-700:#3a4230;--olive-600:#4d5740;
--tactical-900:#0C1117;--tactical-800:#111921;--tactical-700:#19232e;--tactical-600:#212f3d;
--steel-500:#5C6B7A;--steel-400:#7A8B9A;--steel-300:#9BAABC;
--accent:#C8A44E;--accent-light:#DFC06A;--accent-dark:#A6853A;
--green-500:#22C55E;--green-400:#4ADE80;--amber-500:#EAB308;--red-500:#EF4444;--red-400:#F87171;
--blue-500:#3B82F6;--purple-500:#8B5CF6;
--gray-50:#F0F2F5;--gray-100:#E4E7EB;--gray-200:#D1D5DB;--gray-300:#9CA3AF;
--gray-400:#6B7280;--gray-500:#4B5563;--gray-600:#374151;--gray-700:#1F2937;--gray-800:#111827;--gray-900:#0A0E14;
--bg:#F0F2F5;--bg-card:#FFFFFF;--bg-sidebar:var(--tactical-800);--bg-topbar:#FFFFFF;
--text:#111827;--text-sec:#6B7280;--text-side:#C4CDD8;
--border:#D1D5DB;--shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);--shadow-lg:0 8px 24px rgba(0,0,0,.12);
--radius:4px;--radius-lg:6px;--sidebar-w:250px;--topbar-h:52px;
--st-apte:var(--green-500);--st-inapte:var(--red-500);--st-mission:var(--blue-500);
--st-conge:var(--amber-500);--st-formation:var(--purple-500);--st-mute:var(--gray-400);
}
[data-theme="dark"]{
--bg:#0A0E14;--bg-card:#111921;--bg-topbar:#111921;
--text:#D1D5DB;--text-sec:#7A8B9A;--border:#1F2937;
--shadow:0 1px 3px rgba(0,0,0,.4);--shadow-lg:0 8px 24px rgba(0,0,0,.5);
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}
/* TACTICAL BACKGROUND PATTERN */
.tac-bg{background-color:var(--tactical-900);background-image:
  linear-gradient(rgba(200,164,78,.03) 1px,transparent 1px),
  linear-gradient(90deg,rgba(200,164,78,.03) 1px,transparent 1px);
  background-size:40px 40px}
/* LOGIN */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background-color:var(--tactical-900);background-image:
  radial-gradient(ellipse at 20% 50%,rgba(200,164,78,.08) 0%,transparent 50%),
  radial-gradient(ellipse at 80% 50%,rgba(59,130,246,.06) 0%,transparent 50%),
  linear-gradient(rgba(200,164,78,.02) 1px,transparent 1px),
  linear-gradient(90deg,rgba(200,164,78,.02) 1px,transparent 1px);
  background-size:100% 100%,100% 100%,32px 32px,32px 32px}
.login-card{background:var(--tactical-800);border:1px solid rgba(200,164,78,.15);border-radius:var(--radius-lg);padding:2.5rem;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.login-card h1{font-size:1.5rem;margin-bottom:.25rem;color:#fff;letter-spacing:.5px}
.login-card p{color:var(--steel-400);margin-bottom:1.5rem;font-size:.8rem;text-transform:uppercase;letter-spacing:2px;font-weight:500}
.login-card .logo-wrap{margin-bottom:1.5rem;text-align:center}
.login-card .form-group label{color:var(--steel-400)}
.login-card .form-group input{background:var(--tactical-700);border-color:rgba(200,164,78,.2);color:#fff}
.login-card .form-group input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(200,164,78,.15)}
.login-card .form-group input::placeholder{color:var(--steel-500)}
.login-card a{color:var(--accent)}
/* LAYOUT */
.app{display:none;height:100vh;overflow:hidden}
.app.active{display:flex}
.sidebar{width:var(--sidebar-w);background:var(--bg-sidebar);color:var(--text-side);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;transition:transform .2s;border-right:1px solid rgba(200,164,78,.08)}
.sidebar .brand{padding:1rem 1.25rem;display:flex;align-items:center;gap:.75rem;border-bottom:1px solid rgba(200,164,78,.1)}
.sidebar .brand svg{width:28px;height:28px;flex-shrink:0}
.sidebar .brand span{font-weight:700;font-size:1rem;letter-spacing:.5px;color:#fff}
.nav-items{flex:1;padding:.75rem 0}
.nav-label{padding:.5rem 1.25rem;font-size:.65rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--steel-500);font-weight:600;margin-top:.5rem}
.nav-item{display:flex;align-items:center;gap:.75rem;padding:.55rem 1.25rem;cursor:pointer;transition:all .15s;font-size:.83rem;font-weight:500;border:none;background:none;color:var(--steel-400);width:100%;text-align:left;border-left:2px solid transparent}
.nav-item:hover{color:#fff;background:rgba(200,164,78,.06)}
.nav-item.active{color:var(--accent);background:rgba(200,164,78,.08);border-left-color:var(--accent)}
.nav-item svg{width:18px;height:18px;opacity:.6;flex-shrink:0}
.nav-item.active svg{opacity:1}
.sidebar-footer{padding:.75rem 1.25rem;border-top:1px solid rgba(200,164,78,.1);font-size:.75rem;color:var(--steel-500)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:var(--topbar-h);background:var(--bg-topbar);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.5rem;gap:1rem;flex-shrink:0}
.topbar .page-title{font-size:.95rem;font-weight:700;flex:1;text-transform:uppercase;letter-spacing:.5px}
.topbar-search{padding:.4rem .75rem;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);width:220px;font-size:.8rem}
.topbar-btn{background:none;border:1px solid var(--border);border-radius:var(--radius);padding:.35rem .6rem;cursor:pointer;color:var(--text);font-size:.78rem;display:flex;align-items:center;gap:.3rem;font-weight:500;transition:all .15s}
.topbar-btn:hover{border-color:var(--accent);color:var(--accent)}
.hamburger{display:none;background:none;border:none;color:var(--text);cursor:pointer;padding:.25rem}
.content{flex:1;overflow-y:auto;padding:1.5rem}
.page{display:none}
.page.active{display:block}
/* COMPONENTS */
.btn{padding:.45rem .9rem;border-radius:var(--radius);font-size:.8rem;font-weight:600;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:.4rem;text-transform:uppercase;letter-spacing:.3px}
.btn-primary{background:var(--accent);color:var(--tactical-900)}
.btn-primary:hover{background:var(--accent-light)}
.btn-success{background:var(--green-500);color:#fff}
.btn-danger{background:var(--red-500);color:#fff}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:.25rem .55rem;font-size:.72rem}
.card{background:var(--bg-card);border-radius:var(--radius-lg);padding:1.25rem;box-shadow:var(--shadow);border:1px solid var(--border)}
[data-theme="dark"] .card{border-color:rgba(200,164,78,.06)}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:.75rem;margin-bottom:1.5rem}
.stat-card{background:var(--bg-card);border-radius:var(--radius-lg);padding:.85rem 1rem;box-shadow:var(--shadow);border:1px solid var(--border);display:flex;align-items:center;gap:.85rem;position:relative;overflow:hidden}
[data-theme="dark"] .stat-card{border-color:rgba(200,164,78,.06)}
.stat-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--accent);opacity:.5}
.stat-icon{width:38px;height:38px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stat-icon svg{width:20px;height:20px;color:#fff}
.stat-val{font-size:1.4rem;font-weight:800;line-height:1.2;font-family:'JetBrains Mono',monospace}
.stat-label{font-size:.7rem;color:var(--text-sec);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
table{width:100%;border-collapse:collapse;font-size:.82rem}
thead th{text-align:left;padding:.5rem .75rem;border-bottom:2px solid var(--border);font-weight:600;color:var(--text-sec);font-size:.7rem;text-transform:uppercase;letter-spacing:.8px;cursor:pointer;white-space:nowrap;user-select:none}
thead th:hover{color:var(--accent)}
tbody td{padding:.55rem .75rem;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr{transition:background .1s}
tbody tr:hover{background:rgba(200,164,78,.03)}
.badge{display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .6rem;border-radius:var(--radius);font-size:.68rem;font-weight:700;white-space:nowrap;text-transform:uppercase;letter-spacing:.3px}
.badge::before{content:'';width:6px;height:6px;border-radius:50%;flex-shrink:0}
.badge-green{background:rgba(34,197,94,.1);color:#16A34A}.badge-green::before{background:#22C55E}
.badge-red{background:rgba(239,68,68,.1);color:#DC2626}.badge-red::before{background:#EF4444}
.badge-amber{background:rgba(234,179,8,.1);color:#CA8A04}.badge-amber::before{background:#EAB308}
.badge-blue{background:rgba(59,130,246,.1);color:#2563EB}.badge-blue::before{background:#3B82F6}
.badge-purple{background:rgba(139,92,246,.1);color:#7C3AED}.badge-purple::before{background:#8B5CF6}
.badge-gray{background:rgba(107,114,128,.1);color:var(--gray-500)}.badge-gray::before{background:var(--gray-400)}
[data-theme="dark"] .badge-green{background:rgba(34,197,94,.15);color:#4ADE80}
[data-theme="dark"] .badge-red{background:rgba(239,68,68,.15);color:#F87171}
[data-theme="dark"] .badge-amber{background:rgba(234,179,8,.15);color:#FACC15}
[data-theme="dark"] .badge-blue{background:rgba(59,130,246,.15);color:#60A5FA}
[data-theme="dark"] .badge-purple{background:rgba(139,92,246,.15);color:#A78BFA}
[data-theme="dark"] .badge-gray{background:rgba(107,114,128,.15);color:var(--gray-300)}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:.72rem;font-weight:600;margin-bottom:.3rem;color:var(--text-sec);text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:.5rem .75rem;border:1px solid var(--border);border-radius:var(--radius);font-size:.83rem;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(200,164,78,.12)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(10,14,20,.7);backdrop-filter:blur(4px);z-index:100;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:var(--bg-card);border-radius:var(--radius-lg);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);border:1px solid var(--border)}
[data-theme="dark"] .modal{border-color:rgba(200,164,78,.1)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.5rem;border-bottom:1px solid var(--border);background:rgba(200,164,78,.03)}
.modal-header h3{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.modal-close{background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--text-sec);padding:.25rem}
.modal-body{padding:1.5rem}
.modal-footer{display:flex;justify-content:flex-end;gap:.5rem;padding:.85rem 1.5rem;border-top:1px solid var(--border)}
/* DETAIL PANEL */
.detail-panel{position:fixed;top:0;right:-450px;width:450px;height:100vh;background:var(--bg-card);border-left:1px solid var(--border);box-shadow:var(--shadow-lg);z-index:90;transition:right .25s;overflow-y:auto}
.detail-panel.open{right:0}
.detail-header{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.5rem;border-bottom:1px solid var(--border);background:rgba(200,164,78,.03)}
.detail-body{padding:1.5rem}
.detail-section{margin-bottom:1.5rem}
.detail-section h4{font-size:.7rem;text-transform:uppercase;color:var(--accent);margin-bottom:.75rem;letter-spacing:1px;font-weight:700}
.detail-row{display:flex;justify-content:space-between;padding:.4rem 0;font-size:.82rem;border-bottom:1px solid var(--border)}
.detail-row span:first-child{color:var(--text-sec);font-size:.75rem;text-transform:uppercase;letter-spacing:.3px}
/* GAUGE */
.gauge-wrap{display:flex;flex-direction:column;align-items:center;padding:1.5rem}
.gauge-svg{width:170px;height:170px;transform:rotate(-90deg)}
.gauge-bg{fill:none;stroke:var(--border);stroke-width:10}
.gauge-fill{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .8s ease}
.gauge-text{font-size:2.2rem;font-weight:800;text-anchor:middle;dominant-baseline:central;fill:var(--text);font-family:'JetBrains Mono',monospace}
.gauge-label{font-size:.72rem;color:var(--text-sec);margin-top:.5rem;text-transform:uppercase;letter-spacing:1px;font-weight:600}
/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:.75rem;margin-bottom:1rem;flex-wrap:wrap}
.toolbar input,.toolbar select{padding:.4rem .7rem;border:1px solid var(--border);border-radius:var(--radius);font-size:.8rem;background:var(--bg);color:var(--text)}
.toolbar input{width:200px}
/* PAGINATION */
.pagination{display:flex;align-items:center;justify-content:center;gap:.35rem;margin-top:1rem;font-size:.8rem}
.pagination button{padding:.25rem .55rem;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-card);color:var(--text);cursor:pointer;font-size:.78rem;font-weight:600}
.pagination button.active{background:var(--accent);color:var(--tactical-900);border-color:var(--accent)}
.pagination button:disabled{opacity:.3;cursor:default}
/* MATRIX */
.matrix-wrap{overflow-x:auto}
.matrix-wrap table{font-size:.75rem}
.matrix-wrap th,.matrix-wrap td{padding:.4rem .5rem;text-align:center;min-width:80px}
.matrix-wrap th:first-child,.matrix-wrap td:first-child{text-align:left;position:sticky;left:0;background:var(--bg-card);z-index:1;min-width:180px}
.matrix-cell{width:22px;height:22px;border-radius:3px;display:inline-block}
.matrix-cell.valid{background:var(--green-500)}
.matrix-cell.expiring{background:var(--amber-500)}
.matrix-cell.expired{background:var(--red-500)}
.matrix-cell.missing{background:var(--gray-200)}
[data-theme="dark"] .matrix-cell.missing{background:var(--gray-600)}
/* ALERT CARDS */
.alert-section{margin-bottom:2rem}
.alert-section h3{font-size:.85rem;margin-bottom:.75rem;display:flex;align-items:center;gap:.5rem;text-transform:uppercase;letter-spacing:.3px;font-weight:700}
.alert-list{display:grid;gap:.5rem}
.alert-card{display:flex;align-items:center;justify-content:space-between;padding:.65rem 1rem;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg-card);border-left:3px solid var(--red-500)}
.alert-card.warn{border-left-color:var(--amber-500)}
.alert-card.info{border-left-color:var(--blue-500)}
.alert-info{display:flex;flex-direction:column;gap:.1rem}
.alert-name{font-weight:600;font-size:.82rem}
.alert-detail{font-size:.72rem;color:var(--text-sec);font-family:'JetBrains Mono',monospace}
/* BAR CHART */
.bar-row{display:flex;align-items:center;gap:.75rem;margin-bottom:.4rem;font-size:.8rem}
.bar-label{width:110px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.3px}
.bar-track{flex:1;height:22px;background:var(--gray-200);border-radius:3px;overflow:hidden}
[data-theme="dark"] .bar-track{background:var(--gray-700)}
.bar-fill{height:100%;border-radius:3px;transition:width .5s;display:flex;align-items:center;padding-left:.5rem;font-size:.68rem;color:#fff;font-weight:700;font-family:'JetBrains Mono',monospace}
/* TOAST */
.toast-container{position:fixed;top:1rem;right:1rem;z-index:200;display:flex;flex-direction:column;gap:.5rem}
.toast{padding:.65rem 1.25rem;border-radius:var(--radius);font-size:.82rem;font-weight:600;box-shadow:var(--shadow-lg);animation:slideIn .25s;display:flex;align-items:center;gap:.5rem;min-width:250px;border-left:3px solid}
.toast-success{background:#065F46;color:#D1FAE5;border-left-color:#22C55E}
.toast-error{background:#7F1D1D;color:#FEE2E2;border-left-color:#EF4444}
.toast-warning{background:#78350F;color:#FEF3C7;border-left-color:#EAB308}
.toast-info{background:#1E3A5F;color:#DBEAFE;border-left-color:#3B82F6}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
/* TABS */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1.5rem}
.tab{padding:.55rem 1.25rem;cursor:pointer;font-size:.78rem;font-weight:600;color:var(--text-sec);border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none;text-transform:uppercase;letter-spacing:.5px}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-content{display:none}
.tab-content.active{display:block}
/* ONLINE/OFFLINE INDICATOR */
.conn-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:.3rem;flex-shrink:0}
.conn-dot.online{background:var(--green-500)}
.conn-dot.offline{background:var(--red-500)}
.conn-status{display:flex;align-items:center;font-size:.72rem;padding:.35rem .6rem;border:1px solid var(--border);border-radius:var(--radius);color:var(--text-sec)}
/* RBAC HIDDEN */
.rbac-hide{display:none!important}
/* ONBOARDING WIZARD */
.wizard-wrap{max-width:600px;margin:3rem auto}
.wizard-steps{display:flex;gap:0;margin-bottom:2rem;border-bottom:2px solid var(--border)}
.wizard-step{padding:.5rem 1.25rem;font-size:.78rem;font-weight:600;color:var(--text-sec);border-bottom:2px solid transparent;margin-bottom:-2px;cursor:default}
.wizard-step.active{color:var(--accent);border-bottom-color:var(--accent)}
.wizard-step.done{color:var(--green-500);border-bottom-color:var(--green-500)}
.preset-btn{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:.5rem .9rem;font-size:.8rem;cursor:pointer;transition:all .15s;color:var(--text);font-weight:500}
.preset-btn:hover{border-color:var(--accent);color:var(--accent)}
/* TREND CHART */
.trend-chart{display:flex;align-items:flex-end;gap:4px;height:120px;padding:0 .5rem}
.trend-bar-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.trend-bar{width:100%;border-radius:3px 3px 0 0;transition:height .5s;min-height:2px;position:relative}
.trend-bar-label{font-size:.6rem;color:var(--text-sec);white-space:nowrap;font-family:'JetBrains Mono',monospace}
/* RESPONSIVE */
@media(max-width:768px){
.sidebar{position:fixed;z-index:80;height:100vh;transform:translateX(-100%)}
.sidebar.open{transform:translateX(0)}
.hamburger{display:block}
.topbar-search{width:140px}
.content{padding:1rem}
.stat-grid{grid-template-columns:1fr 1fr}
.form-row{grid-template-columns:1fr}
.detail-panel{width:100%}
.toolbar{flex-direction:column;align-items:stretch}
.toolbar input{width:100%}
}
/* PRINT */
@media print{
.sidebar,.topbar,.toolbar,.btn,.pagination,.toast-container,.modal-overlay,.detail-panel{display:none!important}
.app{display:block!important}
.content{padding:0!important;overflow:visible!important}
.page{display:block!important}
.card{box-shadow:none!important;border:1px solid #ddd!important}
}
/* SKELETON */
.skeleton{background:linear-gradient(90deg,var(--gray-200) 25%,var(--gray-100) 50%,var(--gray-200) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skeleton-line{height:14px;margin-bottom:.5rem;border-radius:4px}
.skeleton-card{height:80px;border-radius:var(--radius-lg)}
/* FORM VALIDATION */
.form-error{border-color:var(--red-500)!important}
.form-error-msg{color:var(--red-500);font-size:.72rem;margin-top:.2rem}
/* SEARCH DROPDOWN */
.search-wrap{position:relative;display:inline-block}
.search-results{position:absolute;top:100%;left:0;right:0;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-lg);max-height:350px;overflow-y:auto;z-index:50;display:none}
.search-results.active{display:block}
.search-result{padding:.5rem .75rem;cursor:pointer;font-size:.82rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.5rem}
.search-result:hover{background:rgba(200,164,78,.06)}
.search-result .sr-type{font-size:.65rem;text-transform:uppercase;letter-spacing:.5px;color:var(--accent);font-weight:700;width:60px;flex-shrink:0}
/* NOTIFICATION BELL */
.notif-bell{position:relative;cursor:pointer;background:none;border:1px solid var(--border);border-radius:var(--radius);padding:.35rem .6rem;display:flex;align-items:center;color:var(--text);transition:all .15s}
.notif-bell:hover{border-color:var(--accent);color:var(--accent)}
.notif-badge{position:absolute;top:-4px;right:-4px;background:var(--red-500);color:#fff;font-size:.6rem;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
.notif-dropdown{position:absolute;top:100%;right:0;width:320px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);max-height:400px;overflow-y:auto;display:none;z-index:50}
.notif-dropdown.active{display:block}
.notif-item{padding:.6rem .75rem;border-bottom:1px solid var(--border);font-size:.8rem;cursor:pointer}
.notif-item:hover{background:rgba(200,164,78,.04)}
.notif-item .ni-title{font-weight:600;margin-bottom:.15rem}
.notif-item .ni-detail{color:var(--text-sec);font-size:.72rem}
.notif-wrap{position:relative}
/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border)}
.cal-header{padding:.4rem;text-align:center;font-size:.7rem;font-weight:700;text-transform:uppercase;background:var(--bg-card);color:var(--text-sec)}
.cal-day{min-height:80px;padding:.4rem;background:var(--bg-card);font-size:.78rem;cursor:pointer;position:relative}
.cal-day:hover{background:rgba(200,164,78,.04)}
.cal-day.today{background:rgba(200,164,78,.08)}
.cal-day.other-month{opacity:.3}
.cal-day .day-num{font-weight:700;margin-bottom:.25rem;font-family:'JetBrains Mono',monospace}
.cal-dots{display:flex;flex-wrap:wrap;gap:2px}
.cal-dot{width:6px;height:6px;border-radius:50%}
.cal-dot.cert-exp{background:var(--red-500)}
.cal-dot.cert-warn{background:var(--amber-500)}
.cal-dot.deploy{background:var(--blue-500)}
.cal-dot.medical{background:var(--purple-500)}
.cal-event{font-size:.65rem;padding:1px 3px;border-radius:2px;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* UNIT TREE */
.unit-tree-row{display:flex;align-items:center;padding:.45rem .75rem;border-bottom:1px solid var(--border);font-size:.82rem}
.unit-tree-row:hover{background:rgba(200,164,78,.03)}
/* MAP — military dark theme */
.map-container{height:500px;border-radius:var(--radius-lg);overflow:hidden;border:1px solid rgba(200,164,78,.15);margin-bottom:1rem}
.map-sidebar{display:grid;grid-template-columns:1fr 300px;gap:1rem}
/* Leaflet popup military style */
.leaflet-popup-content-wrapper{background:rgba(12,17,23,.92)!important;color:#D1D5DB!important;border:1px solid rgba(200,164,78,.2)!important;border-radius:4px!important;font-family:'Inter',sans-serif!important;font-size:.78rem!important;backdrop-filter:blur(8px)!important;box-shadow:0 4px 20px rgba(0,0,0,.5)!important}
.leaflet-popup-content{margin:8px 12px!important;line-height:1.5!important}
.leaflet-popup-content strong{color:#C8A44E!important}
.leaflet-popup-tip{background:rgba(12,17,23,.92)!important;border:1px solid rgba(200,164,78,.2)!important}
.leaflet-popup-close-button{color:#7A8B9A!important}
.leaflet-popup-close-button:hover{color:#C8A44E!important}
/* Leaflet zoom controls military style */
.leaflet-control-zoom a{background:rgba(12,17,23,.85)!important;color:#C8A44E!important;border-color:rgba(200,164,78,.2)!important}
.leaflet-control-zoom a:hover{background:rgba(200,164,78,.15)!important}
.leaflet-control-attribution{background:rgba(12,17,23,.6)!important;color:#4B5563!important;font-size:.55rem!important}
.leaflet-control-attribution a{color:#6B7280!important}
/* Map grid overlay scanlines */
#tacticalMap{position:relative}
#tacticalMap::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(200,164,78,.015) 2px,rgba(200,164,78,.015) 4px);mix-blend-mode:overlay}
/* CONFLICT ZONES PULSING */
.conflict-pulse{animation:conflictPulse 2s ease-in-out infinite}
@keyframes conflictPulse{0%,100%{opacity:.8}50%{opacity:.3}}
.weather-widget{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem}
.weather-widget h4{font-size:.75rem;text-transform:uppercase;letter-spacing:.8px;color:var(--accent);margin-bottom:.75rem;font-weight:700}
.weather-main{display:flex;align-items:center;gap:1rem;margin-bottom:.75rem}
.weather-temp{font-size:2rem;font-weight:800;font-family:'JetBrains Mono',monospace}
.weather-desc{font-size:.82rem;color:var(--text-sec);text-transform:capitalize}
.weather-details{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;font-size:.78rem}
.weather-details span{color:var(--text-sec)}
.weather-details strong{color:var(--text)}
.map-legend{display:flex;gap:1rem;margin-bottom:.75rem;font-size:.75rem;flex-wrap:wrap}
.map-legend-item{display:flex;align-items:center;gap:.3rem}
.map-legend-dot{width:10px;height:10px;border-radius:50%}
.milsym-icon{background:none!important;border:none!important}
.aircraft-icon{background:none!important;border:none!important;transition:transform .3s linear}
.satellite-icon{background:none!important;border:none!important}
.sat-dot{background:none!important;border:none!important}
.iss-trail{stroke:#8B5CF6;stroke-width:2;stroke-dasharray:6 4;fill:none;opacity:.6}
.aircraft-trail{stroke:rgba(255,215,0,.3);stroke-width:1;fill:none}
.pulse-dot{animation:pulse-ring 2s ease-out infinite}
@keyframes pulse-ring{0%{r:6;opacity:.8}100%{r:18;opacity:0}}
@media(max-width:768px){.map-sidebar{grid-template-columns:1fr}}
.layer-panel{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:.75rem;font-size:.78rem;max-height:400px;overflow-y:auto}
.layer-panel h4{font-size:.68rem;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:.5rem;font-weight:700}
.layer-panel label{display:flex;align-items:center;gap:.5rem;padding:.3rem 0;cursor:pointer;font-weight:500}
.layer-panel input[type="checkbox"]{accent-color:var(--accent)}
.intel-counter{position:absolute;top:10px;right:10px;z-index:1000;background:rgba(12,17,23,.85);backdrop-filter:blur(8px);border:1px solid rgba(200,164,78,.2);border-radius:var(--radius-lg);padding:.5rem .75rem;color:#fff;font-size:.7rem;font-family:'JetBrains Mono',monospace;pointer-events:none}
.intel-counter .ic-row{display:flex;justify-content:space-between;gap:1rem;padding:.15rem 0}
.intel-counter .ic-val{color:var(--accent);font-weight:700}
.aq-widget{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:.75rem;margin-top:.75rem}
.aq-widget h4{font-size:.68rem;text-transform:uppercase;letter-spacing:.8px;color:var(--accent);margin-bottom:.5rem;font-weight:700}
.aq-bar{height:8px;border-radius:4px;margin:.4rem 0}
.aq-details{display:grid;grid-template-columns:1fr 1fr;gap:.3rem;font-size:.72rem}
/* ALERT STATE */
.alert-state{display:flex;align-items:center;gap:.4rem;padding:.3rem .7rem;border-radius:var(--radius);cursor:pointer;border:1px solid var(--border);font-family:'JetBrains Mono',monospace}
.alert-dot{width:8px;height:8px;border-radius:50%;animation:alertPulse 2s infinite;flex-shrink:0}
@keyframes alertPulse{0%,100%{opacity:1}50%{opacity:.4}}
.alert-state[data-level="0"]{border-color:#22C55E}.alert-state[data-level="0"] .alert-dot{background:#22C55E}
.alert-state[data-level="1"]{border-color:#3B82F6}.alert-state[data-level="1"] .alert-dot{background:#3B82F6}

.alert-state[data-level="4"]{border-color:#EF4444}.alert-state[data-level="4"] .alert-dot{background:#EF4444;animation:alertPulse .5s infinite}

function t(k){return T[currentLang]?.[k]||T.fr[k]||k}
function rankLabel(id){const r=RANKS.find(x=>x.id===id);return r?r[currentLang]||r.fr:id||''}
function catLabel(c){return t(c)||c}

/* ===== UTILITIES ===== */
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function showToast(msg,type='success'){const c=document.getElementById('toastContainer');const el=document.createElement('div');el.className='toast toast-'+type;el.textContent=msg;c.appendChild(el);setTimeout(()=>el.remove(),3500)}
function formatDate(d){if(!d)return'—';const p=new Date(d);const loc=currentLang==='nl'?'nl-BE':currentLang==='en'?'en-GB':'fr-BE';return p.toLocaleDateString(loc)}
function daysDiff(d){if(!d)return Infinity;return Math.ceil((new Date(d)-new Date())/(1000*60*60*24))}
function paginateArray(arr,page,size){const total=Math.ceil(arr.length/size)||1;const items=arr.slice((page-1)*size,page*size);return{items,total,current:page}}
function sortArray(arr,field,dir){return[...arr].sort((a,b)=>{let va=a[field]??'',vb=b[field]??'';if(typeof va==='string')va=va.toLowerCase();if(typeof vb==='string')vb=vb.toLowerCase();if(va<vb)return dir==='asc'?-1:1;if(va>vb)return dir==='asc'?1:-1;return 0})}
function statusBadge(s){const map={apte:'green',inapte_temp:'red',inapte_def:'red',en_mission:'blue',en_conge:'amber',en_formation:'purple',mute:'gray'};return`<span class="badge badge-${map[s]||'gray'}">${esc(t(s))}</span>`}
function certBadge(s){const map={valid:'green',expiring:'amber',expired:'red'};return`<span class="badge badge-${map[s]||'gray'}">${esc(t(s))}</span>`}
function deployBadge(s){const map={planned:'blue',active:'green',completed:'gray',cancelled:'red'};return`<span class="badge badge-${map[s]||'gray'}">${esc(t(s))}</span>`}

function openModal(html){document.getElementById('modalContent').innerHTML=html;document.getElementById('modalOverlay').classList.add('active')}
function closeModal(){document.getElementById('modalOverlay').classList.remove('active')}
function closeDetail(){document.getElementById('detailPanel').classList.remove('open')}

/* ===== RBAC ===== */
function getRole(){return currentProfile?.role||'operator'}
function isAdmin(){return getRole()==='admin'}
function canEdit(){const r=getRole();return r==='admin'||r==='commander'||r==='operator'}
function canDelete(){const r=getRole();return r==='admin'||r==='commander'}

/* ===== CONNECTIVITY ===== */
function setupConnectivityListeners(){
function update(online){
isOnline=online;
const dot=document.getElementById('connDot');
const lbl=document.getElementById('connLabel');
if(dot){dot.className='conn-dot '+(online?'online':'offline')}
if(lbl){lbl.textContent=online?'Online':'Offline'}
if(!online)showToast('Mode hors-ligne / Offline modus','warning');
}
window.addEventListener('online',()=>update(true));
window.addEventListener('offline',()=>update(false));
update(navigator.onLine);
}

function renderPagination(containerId,totalPages,current,onPage){
let h='<div class="pagination">';
h+=`<button ${current<=1?'disabled':''} onclick="${onPage}(${current-1})">&laquo;</button>`;
for(let i=1;i<=totalPages;i++){h+=`<button class="${i===current?'active':''}" onclick="${onPage}(${i})">${i}</button>`}
h+=`<button ${current>=totalPages?'disabled':''} onclick="${onPage}(${current+1})">&raquo;</button></div>`;
return h;
}

/* ===== AUTH ===== */
function toggleAuthMode(){
isSignupMode=!isSignupMode;
document.getElementById('signupFields').style.display=isSignupMode?'block':'none';
document.getElementById('authBtn').textContent=isSignupMode?t('create_account'):t('login');
document.getElementById('authToggle').textContent=isSignupMode?t('have_account'):t('no_account');
}
async function handleAuth(){
const email=document.getElementById('loginEmail').value.trim();
const pass=document.getElementById('loginPassword').value;
if(!email||!pass)return showToast('Email & password required','error');
if(isSignupMode){
const name=document.getElementById('signupName').value.trim();
const{data,error}=await sb.auth.signUp({email,password:pass,options:{data:{full_name:name}}});
if(error)return showToast(error.message,'error');
currentUser=data.user;
initApp();
}else{
const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
if(error)return showToast(error.message,'error');
currentUser=data.user;
initApp();
}
}
async function handleLogout(){await sb.auth.signOut();currentUser=null;document.getElementById('app').classList.remove('active');document.getElementById('loginPage').style.display='flex'}
async function checkSession(){
const{data:{session}}=await sb.auth.getSession();
if(session){currentUser=session.user;initApp()}
}

/* ===== INIT ===== */
async function initApp(){
document.getElementById('loginPage').style.display='none';
document.getElementById('app').classList.add('active');
// Fetch profile for RBAC
try{const{data}=await sb.from('profiles').select('*').eq('id',currentUser.id).single();currentProfile=data||{role:'operator'}}catch(e){currentProfile={role:'operator'}}
buildNav();
loadAppData();
setupConnectivityListeners();
}

async function loadAppData(){
try{
const[u,p,ct,c,d]=await Promise.all([
sb.from('units').select('*').order('name'),
sb.from('personnel').select('*, unit:units(name,abbreviation)').order('last_name'),
sb.from('cert_types').select('*').order('name_fr'),
sb.from('certifications').select('*, personnel:personnel(last_name,first_name,rank,unit_id), cert_type:cert_types(name_fr,name_nl,category,validity_months)').order('expiry_date'),
sb.from('deployments').select('*, personnel:personnel(last_name,first_name,rank)').order('start_date',{ascending:false})
]);
appUnits=u.data||[];appPersonnel=p.data||[];appCertTypes=ct.data||[];appCerts=c.data||[];appDeployments=d.data||[];
// Cache to localStorage for offline mode
try{localStorage.setItem('dur_cache',JSON.stringify({appUnits,appPersonnel,appCertTypes,appCerts,appDeployments,ts:Date.now()}))}catch(e){}
updateCertStatuses();
renderAll();
// Show onboarding if no data
checkOnboarding();
}catch(e){
// Offline fallback
const cache=localStorage.getItem('dur_cache');
if(cache){try{const d=JSON.parse(cache);appUnits=d.appUnits||[];appPersonnel=d.appPersonnel||[];appCertTypes=d.appCertTypes||[];appCerts=d.appCerts||[];appDeployments=d.appDeployments||[];updateCertStatuses();renderAll();showToast('Mode hors-ligne / Offline modus','warning')}catch(e2){showToast(t('error_occurred'),'error')}}
else{showToast(t('error_occurred'),'error');console.error(e)}
}
}
function updateCertStatuses(){
const today=new Date();
appCerts.forEach(c=>{
const exp=new Date(c.expiry_date);
const diff=daysDiff(c.expiry_date);
if(diff<0)c.status='expired';
else if(diff<=30)c.status='expiring';
else c.status='valid';
});
}
function renderAll(){renderDashboard();renderPersonnel();renderCertMatrix();renderAlerts();renderDeployments();renderReports();renderCalendar();renderMap();renderOps();renderSettings();renderAPIPage();updateNotifications()}

async function savePersonnel(id){
if(!validateForm([{id:'mLast',required:true},{id:'mFirst',required:true}]))return;
const data={
rank:document.getElementById('mRank').value,
last_name:document.getElementById('mLast').value.trim(),
first_name:document.getElementById('mFirst').value.trim(),
unit_id:document.getElementById('mUnit').value||null,
function:document.getElementById('mFunc').value.trim()||null,
status:document.getElementById('mStatus').value,
medical_expiry:document.getElementById('mMedical').value||null,
phone:document.getElementById('mPhone').value.trim()||null,
email:document.getElementById('mEmail').value.trim()||null,
matricule:document.getElementById('mMatricule').value.trim()||null,
birth_date:document.getElementById('mBirth').value||null,
blood_type:document.getElementById('mBlood').value||null,
status_note:document.getElementById('mNote').value.trim()||null,
owner_id:currentUser.id
};
let err,res;
if(id){({error:err}=await sb.from('personnel').update(data).eq('id',id));if(!err)logAudit('update','personnel',id,data.last_name+' '+data.first_name)}
else{({error:err,data:res}=await sb.from('personnel').insert(data).select().single());if(!err)logAudit('create','personnel',res?.id,data.last_name+' '+data.first_name)}
if(err)return showToast(err.message,'error');
showToast(t('saved'));closeModal();loadAppData();
}

function updateCertExpiry(){
const sel=document.getElementById('cType');if(!sel)return;
const months=parseInt(sel.selectedOptions[0]?.dataset.months||12);
const obt=document.getElementById('cObtained').value;
if(obt){const d=new Date(obt);d.setMonth(d.getMonth()+months);document.getElementById('cExpiry').value=d.toISOString().slice(0,10)}
}
async function saveCert(id){
if(!validateForm([{id:'cObtained',required:true},{id:'cExpiry',required:true}]))return;
const data={
personnel_id:document.getElementById('cPersId').value,
cert_type_id:document.getElementById('cType').value,
obtained_date:document.getElementById('cObtained').value,
expiry_date:document.getElementById('cExpiry').value,
notes:document.getElementById('cNotes').value.trim()||null,
owner_id:currentUser.id
};
const diff=daysDiff(data.expiry_date);
data.status=diff<0?'expired':diff<=30?'expiring':'valid';
let err,res,savedId=id;
if(id){({error:err}=await sb.from('certifications').update(data).eq('id',id));if(!err)logAudit('update','certification',id,data.cert_type_id)}
else{({error:err,data:res}=await sb.from('certifications').insert(data).select().single());if(!err){savedId=res?.id;logAudit('create','certification',savedId,data.cert_type_id)}}
if(err)return showToast(err.message,'error');
// Upload cert document if provided
const fileInput=document.getElementById('cDocFile');
if(fileInput?.files[0]&&savedId)await uploadCertDoc(fileInput.files[0],savedId);
showToast(t('saved'));closeModal();loadAppData();
}
async function uploadCertDoc(file,certId){
try{
const ext=file.name.split('.').pop();
const path=`${currentUser.id}/${certId}.${ext}`;
const{error:upErr}=await sb.storage.from('cert-docs').upload(path,file,{upsert:true});
if(upErr)throw upErr;
const{data:urlData}=sb.storage.from('cert-docs').getPublicUrl(path);
await sb.from('certifications').update({document_url:urlData.publicUrl}).eq('id',certId);
showToast(t('doc_uploaded'));
}catch(e){showToast(e.message||t('error_occurred'),'error')}
}
async function deleteCert(id){
if(!confirm(t('confirm_delete')))return;
const{error}=await sb.from('certifications').delete().eq('id',id);
if(error)return showToast(error.message,'error');
logAudit('delete','certification',id,'');
showToast(t('deleted'));closeModal();loadAppData();
}

function renderAlerts(){
const expired=appCerts.filter(c=>c.status==='expired');
const exp30=appCerts.filter(c=>c.status==='expiring');
const exp90=appCerts.filter(c=>{const d=daysDiff(c.expiry_date);return d>30&&d<=90});
const medAlerts=appPersonnel.filter(p=>{const d=daysDiff(p.medical_expiry);return d<=60&&d>-Infinity&&d!==Infinity});

function alertCards(certs,colorClass){
if(!certs.length)return`<p style="color:var(--text-sec);font-size:.83rem">${t('no_alerts')}</p>`;
let h='<div class="alert-list">';
certs.forEach(c=>{
const pName=c.personnel?`${rankLabel(c.personnel.rank)} ${c.personnel.first_name} ${c.personnel.last_name}`:'—';
const cName=currentLang==='nl'?c.cert_type?.name_nl:c.cert_type?.name_fr;
const diff=daysDiff(c.expiry_date);

h+=`<div class="alert-card"><div class="alert-info"><span class="alert-name">${esc(pName)}</span><span class="alert-detail">${esc(cName||'')} — ${esc(detail)} — ${formatDate(c.expiry_date)}</span></div>
<button class="btn btn-sm btn-outline" onclick="openCertModal('${c.personnel_id}','${c.id}','${c.cert_type_id}')">${t('renew')}</button></div>`;
});
return h+'</div>';
}

if(medAlerts.length){h+='<div class="alert-list">';medAlerts.forEach(p=>{

/* ===== EMAIL / ALERTS ===== */
async function sendAlertEmail(to, subject, htmlBody) {
  try {
    const { data, error } = await sb.functions.invoke('send-email', {
      body: { to, subject, html: htmlBody }
    });
    if (error) throw error;
    return true;
  } catch(e) { console.warn('Email send failed:', e); return false; }
}

async function sendWeeklyReport() {
  const to = currentUser?.email;
  if (!to) return showToast(t('error_occurred'), 'error');
  const reportHtml = genReadinessReport();
  const today = new Date().toISOString().slice(0, 10);
  const subject = `Durendal — ${t('weekly_readiness')} — ${today}`;
  const ok = await sendAlertEmail(to, subject, `<html><body style="font-family:sans-serif;padding:2rem">${reportHtml}</body></html>`);
  if (ok) showToast(t('report_sent'));
}

async function sendCertExpiryAlerts() {
  const expiring7 = appCerts.filter(c => { const d = daysDiff(c.expiry_date); return d >= 0 && d <= 7; });
  if (!expiring7.length) { showToast('0 ' + t('alerts_sent'), 'info'); return; }
  let sent = 0;
  for (const c of expiring7) {
    const p = appPersonnel.find(x => x.id === c.personnel_id);
    if (!p?.email) continue;
    const certName = currentLang === 'nl' ? c.cert_type?.name_nl : c.cert_type?.name_fr;
    const daysLeft = daysDiff(c.expiry_date);
    const htmlBody = `<html><body style="font-family:sans-serif;padding:2rem">
<h2 style="color:#C8A44E">Durendal — Certification Alert</h2>
<p>${esc(rankLabel(p.rank))} ${esc(p.first_name)} ${esc(p.last_name)},</p>
<p>Your certification <strong>${esc(certName || '')}</strong> expires in <strong>${daysLeft} ${t('days')}</strong> (${c.expiry_date}).</p>
<p>Please contact your unit commander to schedule renewal.</p>
</body></html>`;
    const ok = await sendAlertEmail(p.email, `Durendal — Cert Expiry: ${certName}`, htmlBody);
    if (ok) sent++;
  }
  showToast(`${sent} ${t('alerts_sent')}`);
}

/* ===== CoT EXPORT ===== */
function exportCoT() {
  let xml = '<?xml version="1.0" encoding="UTF-8"?>\n';
  xml += '<events>\n';
  appUnits.forEach(u => {
    const coords = BASE_COORDS?.[u.location] || [50.85, 4.35];
    const uPers = appPersonnel.filter(p => p.unit_id === u.id);
    const readiness = uPers.length ? Math.round(uPers.filter(p=>p.status==='apte').length / uPers.length * 100) : 0;
    const now = new Date().toISOString();
    const stale = new Date(Date.now() + 3600000).toISOString();
    xml += `  <event version="2.0" uid="durendal-unit-${u.id}" type="a-f-G-U-C-I" time="${now}" start="${now}" stale="${stale}" how="m-g">\n`;
    xml += `    <point lat="${coords[0]}" lon="${coords[1]}" hae="0" ce="50" le="50"/>\n`;
    xml += `    <detail>\n`;
    xml += `      <contact callsign="${esc(u.abbreviation || u.name)}"/>\n`;
    xml += `      <remarks>Readiness: ${readiness}% | Personnel: ${uPers.length} | ${esc(u.name)}</remarks>\n`;
    xml += `    </detail>\n`;
    xml += `  </event>\n`;
  });
  xml += '</events>';
  const blob = new Blob([xml], {type: 'application/xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'durendal-cot-' + new Date().toISOString().slice(0,10) + '.xml';
  a.click();
  showToast(t('cot_exported'), 'success');
}

/* ===== FORM VALIDATION ===== */
function validateForm(fields){
let valid=true;
fields.forEach(f=>{
const el=document.getElementById(f.id);if(!el)return;
const wrap=el.closest('.form-group');
el.classList.remove('form-error');
wrap?.querySelector('.form-error-msg')?.remove();
if(f.required&&!el.value.trim()){
el.classList.add('form-error');
const msg=document.createElement('div');msg.className='form-error-msg';msg.textContent='Requis';
wrap?.appendChild(msg);valid=false;
}
});
return valid;
}

res.classList.add('active');
}

/* ===== CSV IMPORT ===== */
function parseCSV(text){
const lines=text.trim().split('\n');if(!lines.length)return{headers:[],rows:[]};
const sep=lines[0].includes(';')?';':',';
const headers=lines[0].split(sep).map(h=>h.trim().replace(/^"|"$/g,''));
const rows=lines.slice(1).map(l=>{const cells=l.split(sep).map(c=>c.trim().replace(/^"|"$/g,''));const obj={};headers.forEach((h,i)=>obj[h]=cells[i]||'');return obj});
return{headers,rows};
}
function openImportCSVModal(){
const fields=['rank','last_name','first_name','unit','function','status','matricule','email','phone'];
let h=`<div class="modal-header"><h3>${t('import_csv')}</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
<div class="modal-body">
<div class="form-group"><label>${t('import_csv')}</label><input type="file" id="csvFile" accept=".csv" onchange="handleCSVPreview(this)"></div>
<div id="csvPreview"></div>
<div id="csvMapping" style="display:none">
<h4 style="margin:.75rem 0 .5rem;font-size:.78rem;text-transform:uppercase;color:var(--accent)">${t('column_mapping')}</h4>
<div id="csvMapFields"></div>
</div>
</div>
<div class="modal-footer">
<button class="btn btn-outline" onclick="closeModal()">${t('cancel')}</button>
<button class="btn btn-primary" id="csvImportBtn" style="display:none" onclick="doImportCSV()">${t('import')}</button>
</div>`;
openModal(h);
}
function handleCSVPreview(input){
const file=input.files[0];if(!file)return;
const reader=new FileReader();
reader.onload=e=>{
const{headers,rows}=parseCSV(e.target.result);
window._csvParsed={headers,rows};
const preview=document.getElementById('csvPreview');
const first5=rows.slice(0,5);
let ph=`<div class="card" style="overflow-x:auto;padding:0;margin:.75rem 0"><table><thead><tr>${headers.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead><tbody>`;
first5.forEach(r=>{ph+=`<tr>${headers.map(h=>`<td>${esc(r[h]||'')}</td>`).join('')}</tr>`});
ph+=`</tbody></table></div>`;
preview.innerHTML=ph;
const fields=['rank','last_name','first_name','unit','function','status','matricule','email','phone'];
const mapDiv=document.getElementById('csvMapFields');
mapDiv.innerHTML=fields.map(f=>`<div class="form-row" style="margin-bottom:.5rem"><div class="form-group" style="margin:0"><label style="text-transform:none;font-size:.78rem">${t(f==='function'?'function_':f)||f}</label></div><div class="form-group" style="margin:0"><select id="map_${f}"><option value="">— ${t('no_data')} —</option>${headers.map(h=>`<option value="${esc(h)}" ${h.toLowerCase().includes(f.replace('_',''))||h.toLowerCase()===f?'selected':''}>${esc(h)}</option>`).join('')}</select></div></div>`).join('');
document.getElementById('csvMapping').style.display='block';
document.getElementById('csvImportBtn').style.display='';
};
reader.readAsText(file);
}
async function doImportCSV(){
const{headers,rows}=window._csvParsed||{headers:[],rows:[]};
if(!rows.length)return showToast(t('no_data'),'error');
const fields=['rank','last_name','first_name','unit','function','status','matricule','email','phone'];
const mapping={};fields.forEach(f=>{const sel=document.getElementById('map_'+f);if(sel)mapping[f]=sel.value});
const inserts=rows.filter(r=>r[mapping.last_name]).map(r=>{
const unitName=mapping.unit?r[mapping.unit]:'';
const unit=appUnits.find(u=>u.name.toLowerCase()===unitName.toLowerCase()||u.abbreviation?.toLowerCase()===unitName.toLowerCase());

});
if(!inserts.length)return showToast(t('no_data'),'error');
const{error}=await sb.from('personnel').insert(inserts);
if(error)return showToast(error.message,'error');
logAudit('import','personnel',null,`${inserts.length} records`);
showToast(`${inserts.length} ${t('persons')} ${t('saved')}`);closeModal();loadAppData();

function exportBackup(){
const d=new Date().toISOString().slice(0,10);
const payload={version:1,exported:new Date().toISOString(),appUnits,appPersonnel,appCertTypes,appCerts,appDeployments};
const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});

async function importBackup(){
const file=document.getElementById('restoreFile')?.files[0];
if(!file)return showToast(t('no_data'),'error');
const reader=new FileReader();
reader.onload=async e=>{
try{
const d=JSON.parse(e.target.result);
if(!d.appUnits||!d.appPersonnel)throw new Error('Invalid backup file');
const uid=currentUser.id;
let count=0;
if(d.appUnits?.length){const ins=d.appUnits.map(({id,...r})=>({...r,owner_id:uid}));await sb.from('units').insert(ins);count+=ins.length}
if(d.appCertTypes?.length){const ins=d.appCertTypes.map(({id,...r})=>({...r,owner_id:uid}));await sb.from('cert_types').insert(ins);count+=ins.length}
if(d.appPersonnel?.length){const ins=d.appPersonnel.map(({id,unit,...r})=>({...r,owner_id:uid}));await sb.from('personnel').insert(ins);count+=ins.length}
showToast(`${count} records importés`);loadAppData();
}catch(err){showToast(err.message,'error')}
};
reader.readAsText(file);
}

/* ===== CALENDAR ===== */
let calYear=new Date().getFullYear(),calMonth=new Date().getMonth();
function renderCalendar(){
const el=document.getElementById('page-calendar');if(!el)return;
const today=new Date();
const firstDay=new Date(calYear,calMonth,1);
const lastDay=new Date(calYear,calMonth+1,0);
const startDow=(firstDay.getDay()+6)%7; // Mon=0
const totalDays=lastDay.getDate();
const locale=currentLang==='nl'?'nl-BE':currentLang==='en'?'en-GB':'fr-BE';
const monthName=firstDay.toLocaleDateString(locale,{month:'long',year:'numeric'});
const dayNames=currentLang==='nl'?['Lun','Mar','Woe','Don','Vri','Zat','Zon']:currentLang==='en'?['Mon','Tue','Wed','Thu','Fri','Sat','Sun']:['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];

// Build event map
const evtMap={};
function addEvt(dateStr,cls,label){if(!dateStr)return;const d=dateStr.slice(0,10);if(!evtMap[d])evtMap[d]=[];evtMap[d].push({cls,label})}
appCerts.filter(c=>c.status==='expired').forEach(c=>addEvt(c.expiry_date,'cert-exp',currentLang==='nl'?c.cert_type?.name_nl:c.cert_type?.name_fr));
appCerts.filter(c=>c.status==='expiring').forEach(c=>addEvt(c.expiry_date,'cert-warn',currentLang==='nl'?c.cert_type?.name_nl:c.cert_type?.name_fr));
appDeployments.forEach(d=>{addEvt(d.start_date,'deploy',d.mission_name);addEvt(d.end_date,'deploy',d.mission_name)});
appPersonnel.filter(p=>p.medical_expiry).forEach(p=>addEvt(p.medical_expiry,'medical',p.last_name));

let h=`<div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem">
<button class="btn btn-outline btn-sm" onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--}renderCalendar()">&laquo;</button>
<span style="font-weight:700;font-size:.95rem;text-transform:capitalize;flex:1;text-align:center">${esc(monthName)}</span>
<button class="btn btn-outline btn-sm" onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++}renderCalendar()">&raquo;</button>
</div>`;

h+=`<div class="cal-grid" style="border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden">`;
dayNames.forEach(d=>{h+=`<div class="cal-header">${d}</div>`});

const totalCells=Math.ceil((startDow+totalDays)/7)*7;
for(let i=0;i<totalCells;i++){
const dayNum=i-startDow+1;
const isThisMonth=dayNum>=1&&dayNum<=totalDays;
const dateStr=isThisMonth?`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`:null;
const isToday=isThisMonth&&calYear===today.getFullYear()&&calMonth===today.getMonth()&&dayNum===today.getDate();
const evts=dateStr?evtMap[dateStr]||[]:[];
h+=`<div class="cal-day${isToday?' today':''}${!isThisMonth?' other-month':''}">`;
if(isThisMonth||!isThisMonth&&dayNum>=1){
const d2=i<startDow?new Date(calYear,calMonth,dayNum):isThisMonth?new Date(calYear,calMonth,dayNum):new Date(calYear,calMonth+1,dayNum-totalDays);
h+=`<div class="day-num">${isThisMonth?dayNum:d2.getDate()}</div>`;
}

function ddToDMS(dd,isLat){
  const dir=dd>=0?(isLat?'N':'E'):(isLat?'S':'W');
  const abs=Math.abs(dd);
  const d=Math.floor(abs);
  const mFull=(abs-d)*60;
  const m=Math.floor(mFull);
  const s=((mFull-m)*60).toFixed(1);
  return `${d}°${String(m).padStart(2,'0')}'${String(s).padStart(4,'0')}"${dir}`;
}

function getAircraftCatInfo(cat){return AIRCRAFT_CAT_INFO[cat]||AIRCRAFT_CAT_INFO[0];}

async function fetchAircraftLayer(){
if(!igAircraft||!window.mapInstance)return;
try{
const center=window.mapInstance.getCenter();
const zoom=window.mapInstance.getZoom();
const dist=zoom>=8?100:zoom>=6?250:zoom>=4?450:800;
const r=await fetch(`https://api.adsb.lol/v2/lat/${center.lat.toFixed(4)}/lon/${center.lng.toFixed(4)}/dist/${dist}`);
if(!r.ok)throw new Error('HTTP '+r.status);
const d=await r.json();
const acList=d.ac||[];
const seenHex=new Set();
let validCount=0;
acList.forEach(a=>{
const hex=a.hex;if(!hex)return;
const lat=a.lat,lon=a.lon;
if(lat==null||lon==null)return;
if(a.alt_baro==='ground')return;
validCount++;
seenHex.add(hex);
const newPos=[lat,lon];
const hdg=a.track||a.true_heading||a.mag_heading||0;
const alt=typeof a.alt_baro==='number'?a.alt_baro:(a.alt_geom||0);
const vel=a.gs||0;
const vRate=a.baro_rate||a.geom_rate||null;
const callsign=(a.flight||'').trim();
const acType=a.t||'';
const reg=a.r||'';
const cat=a.category||'';
const catKey=cat.startsWith('A')?(parseInt(cat[1])||0):cat.startsWith('B')?8:cat.startsWith('C')?14:0;
const mappedCat=catKey>=4&&catKey<=7?4:catKey>=2&&catKey<=3?catKey:catKey===8?8:catKey===14?14:0;
const catInfo=getAircraftCatInfo(mappedCat);
const mach=a.mach?'M'+a.mach.toFixed(2):'';
const popupContent='<strong style="font-size:.88rem">'+esc(callsign||hex)+'</strong>'+
(acType?' <span style="color:var(--accent);font-weight:700">'+esc(acType)+'</span>':'')+
(reg?' <span style="color:var(--text-sec)">'+esc(reg)+'</span>':'')+'<br>'+
'<span style="color:var(--accent)">'+catInfo.label+'</span><br>'+
'ALT: <strong>'+(typeof alt==='number'?alt.toLocaleString():'?')+' ft</strong> ('+(typeof alt==='number'?Math.round(alt*0.3048).toLocaleString():'?')+' m)<br>'+
'GS: <strong>'+Math.round(vel)+' kts</strong> ('+Math.round(vel*1.852)+' km/h) '+esc(mach)+'<br>'+
'HDG: '+Math.round(hdg)+'°'+(a.ias?' | IAS '+Math.round(a.ias)+' kts':'')+'<br>'+
(vRate!=null?'V/S: '+(vRate>0?'+':'')+Math.round(vRate)+' ft/min<br>':'')+
(a.squawk?'SQK: '+esc(a.squawk)+'<br>':'')+
(a.oat!=null?'OAT: '+a.oat+'°C':'');
if(aircraftMarkers[hex]){
const am=aircraftMarkers[hex];
am.marker.setLatLng(newPos);
am.marker.getElement()?.querySelector('.ac-rot')?.style?.setProperty('transform','rotate('+hdg+'deg)');
am.marker.setPopupContent(popupContent);
am.positions.push(newPos);
if(am.positions.length>30)am.positions.shift();
if(am.trail)igAircraft.removeLayer(am.trail);
if(am.positions.length>1){am.trail=L.polyline(am.positions,{weight:1.5,opacity:0.3,color:catInfo.color}).addTo(igAircraft)}
}else{
const sz=catInfo.size;
const icon=L.divIcon({className:'aircraft-icon',
html:'<div class="ac-rot" style="transform:rotate('+hdg+'deg);display:inline-block">'+catInfo.svg+'</div>',
iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});
const marker=L.marker(newPos,{icon}).addTo(igAircraft).bindPopup(popupContent,{maxWidth:320});
aircraftMarkers[hex]={marker,trail:null,positions:[newPos]};
}
});
intelCounts.aircraft=validCount;
Object.keys(aircraftMarkers).forEach(hex=>{
if(!seenHex.has(hex)){
igAircraft.removeLayer(aircraftMarkers[hex].marker);
if(aircraftMarkers[hex].trail)igAircraft.removeLayer(aircraftMarkers[hex].trail);
delete aircraftMarkers[hex];
}
});
if(document.getElementById('layerAircraft')?.checked&&!window.mapInstance.hasLayer(igAircraft))igAircraft.addTo(window.mapInstance);
updateIntelCounter();
console.log('[AIR] '+validCount+' aircraft tracked (adsb.lol)');
}catch(e){console.warn('[AIR] Aircraft fetch failed:',e);}
}

/* === Satellite Constellation Tracker (CelesTrak TLE + satellite.js SGP4) === */
let issMarker=null,issTrailPositions=[],issTrailLine=null; // kept for backward compat refs in clearMapIntervals

function parseTLEText(text){
  const lines=text.trim().split('\n').map(l=>l.trim()).filter(l=>l.length>0);
  const sats=[];
  for(let i=0;i<lines.length-2;i++){
    if(lines[i+1]&&lines[i+1].startsWith('1 ')&&lines[i+2]&&lines[i+2].startsWith('2 ')){
      sats.push({name:lines[i].trim(),line1:lines[i+1],line2:lines[i+2]});
      i+=2;
    }
  }
  return sats;
}

async function loadSatelliteTLEs(){
  if(satLoaded)return;
  satRecords=[];
  console.log('[SAT] Loading TLEs from CelesTrak (TLE text format)...');
  const results=await Promise.allSettled(SAT_GROUPS.map(async group=>{
    const r=await fetch(group.url);
    if(!r.ok)throw new Error('HTTP '+r.status+' for '+group.name);
    const text=await r.text();
    const tles=parseTLEText(text);
    let count=0;
    tles.slice(0,group.max).forEach(tle=>{
      try{
        const satrec=satellite.twoline2satrec(tle.line1,tle.line2);
        if(!satrec||satrec.error!==0)return;
        const noradId=parseInt(tle.line1.substring(2,7).trim());
        satRecords.push({name:tle.name,noradId:noradId,group:group.name,color:group.color,satrec:satrec,marker:null});
        count++;
      }catch(e){}
    });
    console.log('[SAT] '+group.name+': '+count+' satellites loaded');
    return count;
  }));
  results.forEach((r,i)=>{if(r.status==='rejected')console.warn('[SAT] Failed: '+SAT_GROUPS[i].name,r.reason)});
  satLoaded=true;
  intelCounts.satellites=satRecords.length;
  updateIntelCounter();
  console.log('[SAT] TOTAL: '+satRecords.length+' satellites ready for SGP4 propagation');
  showToast(satRecords.length+' '+t('sat_count'),'info');
}

function updateSatellitePositions(){
  if(!igSatellite||!window.mapInstance||!satRecords.length)return;
  const now=new Date();
  const gmst=satellite.gstime(now);
  satRecords.forEach(sat=>{
    try{
      const posVel=satellite.propagate(sat.satrec,now);
      if(!posVel||!posVel.position)return;
      const geo=satellite.eciToGeodetic(posVel.position,gmst);
      const lat=satellite.degreesLat(geo.latitude);
      const lng=satellite.degreesLong(geo.longitude);
      const alt=geo.height; // km
      if(isNaN(lat)||isNaN(lng)||!isFinite(lat)||!isFinite(lng))return;
      // Special treatment for ISS (NORAD 25544) — larger, glowing icon
      const isISS=(sat.noradId===25544||sat.noradId==='25544'||sat.name==='ISS (ZARYA)');
      if(sat.marker){
        sat.marker.setLatLng([lat,lng]);
        if(isISS&&posVel.velocity){
          const vel=Math.sqrt(posVel.velocity.x**2+posVel.velocity.y**2+posVel.velocity.z**2);
          sat.marker.setPopupContent(`<strong>🛰️ ISS (ZARYA)</strong><br>Alt: ${Math.round(alt)} km<br>Vel: ${vel.toFixed(2)} km/s (${Math.round(vel*3600)} km/h)<br>Lat: ${lat.toFixed(5)}<br>Lon: ${lng.toFixed(5)}`);
        }
      }else{
        let icon;
        if(isISS){
          icon=L.divIcon({className:'satellite-icon',html:'<div style="font-size:22px;line-height:1;filter:drop-shadow(0 0 8px #FFD700)">🛰️</div>',iconSize:[22,22],iconAnchor:[11,11]});
        }else{
          const isNav=sat.group==='GPS'||sat.group==='GLONASS'||sat.group==='Galileo';
          const isStation=sat.group==='Stations';
          const size=isStation?12:isNav?8:4;
          icon=L.divIcon({
            className:'sat-dot',
            html:`<div style="width:${size}px;height:${size}px;background:${sat.color};border-radius:50%;opacity:0.8;box-shadow:0 0 ${size}px ${sat.color}"></div>`,
            iconSize:[size,size],iconAnchor:[size/2,size/2]
          });
        }
        const popup=isISS
          ?`<strong>🛰️ ISS (ZARYA)</strong><br>Alt: ${Math.round(alt)} km<br>Lat: ${lat.toFixed(5)}<br>Lon: ${lng.toFixed(5)}`
          :`<strong>${esc(sat.name)}</strong><br>` +
           `<span style="color:${sat.color}">${esc(sat.group)}</span><br>` +
           `NORAD: ${esc(String(sat.noradId||''))}<br>` +
           `ALT: ${Math.round(alt)} km<br>` +
           `LAT: ${lat.toFixed(5)} | LON: ${lng.toFixed(5)}`;
        const zIdx=isISS?1000:(sat.group==='Stations'?500:0);
        sat.marker=L.marker([lat,lng],{icon,zIndexOffset:zIdx}).bindPopup(popup);
        sat.marker.addTo(igSatellite);
      }
    }catch(e){/* skip propagation error */}
  });
  if(document.getElementById('layerSatellite')?.checked&&!window.mapInstance.hasLayer(igSatellite))igSatellite.addTo(window.mapInstance);
}

/* === Belgian Trains (iRail API) — rich version with full routes === */
async function fetchTrainsLayer(){
  if(!igTrains||!window.mapInstance)return;
  try{
    igTrains.clearLayers();
    let count=0;

    // Major Belgian stations with coordinates
    const stations=[
      {name:'Bruxelles-Midi',lat:50.8354,lon:4.3365},
      {name:'Antwerpen-Centraal',lat:51.2172,lon:4.4211},
      {name:'Gent-Sint-Pieters',lat:51.0355,lon:3.7107},
      {name:'Liège-Guillemins',lat:50.6246,lon:5.5667},
      {name:'Brugge',lat:51.1972,lon:3.2169}
    ];

    // Fetch liveboards to get active vehicle IDs
    const vehicleIds=new Set();
    for(const st of stations){
      try{
        const r=await fetch(`https://api.irail.be/liveboard/?station=${encodeURIComponent(st.name)}&format=json&lang=en&alerts=false`);
        if(!r.ok)continue;
        const d=await r.json();
        const deps=d.departures?.departure||[];
        deps.slice(0,4).forEach(dep=>{
          if(dep.vehicleinfo?.shortname)vehicleIds.add(dep.vehicleinfo.shortname);
          else if(dep.vehicle)vehicleIds.add(dep.vehicle.replace('BE.NMBS.',''));
        });
      }catch(e){/* skip station */}
    }

    // Fetch vehicle details for up to 15 trains
    const vehicles=[...vehicleIds].slice(0,15);
    for(const vid of vehicles){
      try{
        const r=await fetch(`https://api.irail.be/vehicle/?id=BE.NMBS.${vid}&format=json&lang=en&alerts=false`);
        if(!r.ok)continue;
        const v=await r.json();
        const stops=v.stops?.stop||[];
        if(stops.length<2)continue;

        const now=Math.floor(Date.now()/1000);
        const origin=stops[0];
        const destination=stops[stops.length-1];

        // Build route coordinates from stops that have stationinfo
        const routeCoords=[];
        let currentStopIdx=0;
        stops.forEach((s,i)=>{
          if(s.stationinfo?.locationY&&s.stationinfo?.locationX){
            routeCoords.push([parseFloat(s.stationinfo.locationY),parseFloat(s.stationinfo.locationX)]);
          }
          const depTime=parseInt(s.time)+parseInt(s.delay||0);
          if(depTime<=now)currentStopIdx=i;
        });

        if(routeCoords.length<2)continue;

        // Draw route polyline
        L.polyline(routeCoords,{
          color:'#22C55E',
          weight:2.5,
          opacity:0.5,
          dashArray:'8 6'
        }).addTo(igTrains);

        // Estimate current position (interpolate between current stop and next)
        let trainLat,trainLon;
        const curStop=stops[currentStopIdx];
        const nextStop=stops[Math.min(currentStopIdx+1,stops.length-1)];
        if(curStop?.stationinfo?.locationY&&nextStop?.stationinfo?.locationY){
          const curTime=parseInt(curStop.time)+parseInt(curStop.delay||0);
          const nextTime=parseInt(nextStop.time)+parseInt(nextStop.delay||0);
          const progress=nextTime>curTime?Math.min(Math.max((now-curTime)/(nextTime-curTime),0),1):0.5;
          trainLat=parseFloat(curStop.stationinfo.locationY)+progress*(parseFloat(nextStop.stationinfo.locationY)-parseFloat(curStop.stationinfo.locationY));
          trainLon=parseFloat(curStop.stationinfo.locationX)+progress*(parseFloat(nextStop.stationinfo.locationX)-parseFloat(curStop.stationinfo.locationX));
        }else{
          trainLat=routeCoords[0][0];
          trainLon=routeCoords[0][1];
        }

        // Determine train type and color from vehicle ID
        const trainType=vid.startsWith('IC')?'InterCity':vid.startsWith('S')?'S-Train':vid.startsWith('L')?'Local':vid.startsWith('P')?'Peak':vid.startsWith('THA')?'Thalys':vid.startsWith('EUR')?'Eurostar':'Train';
        const trainColor=vid.startsWith('IC')?'#3B82F6':(vid.startsWith('THA')||vid.startsWith('EUR'))?'#EF4444':'#22C55E';

        // Train marker icon
        const trainIcon=L.divIcon({
          className:'aircraft-icon',
          html:`<div style="font-size:14px;line-height:1;filter:drop-shadow(0 0 4px ${trainColor})">🚆</div>`,
          iconSize:[14,14],iconAnchor:[7,7]
        });

        // Build rich popup with all stops
        const totalDelay=parseInt(destination.delay||0);
        const delayMin=Math.round(totalDelay/60);
        const delayColor=delayMin>5?'#EF4444':delayMin>0?'#EAB308':'#22C55E';
        const delayText=delayMin>0?`<span style="color:${delayColor};font-weight:700">+${delayMin} min</span>`:`<span style="color:#22C55E;font-weight:700">ON TIME</span>`;

        let stopsHtml='<div style="max-height:150px;overflow-y:auto;margin-top:.4rem;font-size:.7rem;border-top:1px solid rgba(200,164,78,.15);padding-top:.3rem">';
        stops.forEach((s,i)=>{
          const sDelay=Math.round(parseInt(s.delay||0)/60);
          const sTime=new Date(parseInt(s.time)*1000).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
          const isCurrent=i===currentStopIdx;
          const isPast=parseInt(s.time)+parseInt(s.delay||0)<now;
          const opacity=isPast?'0.5':'1';
          const marker=isCurrent?'▶':isPast?'✓':'○';
          const delayS=sDelay>0?` <span style="color:#EF4444">+${sDelay}</span>`:'';
          stopsHtml+=`<div style="opacity:${opacity};padding:.1rem 0">${marker} ${sTime}${delayS} — ${esc(s.station||s.stationinfo?.standardname||'')}</div>`;
        });
        stopsHtml+='</div>';

        const popup=`<strong style="font-size:.85rem">${esc(trainType)} ${esc(vid)}</strong><br>`+
          `<span style="color:var(--accent)">${esc(origin.station||origin.stationinfo?.standardname||'')} → ${esc(destination.station||destination.stationinfo?.standardname||'')}</span><br>`+
          `${delayText} | ${stops.length} stops<br>`+
          `Platform: ${esc(curStop?.platform||'?')}`+
          stopsHtml;

        L.marker([trainLat,trainLon],{icon:trainIcon}).addTo(igTrains).bindPopup(popup,{maxWidth:300});
        count++;

        // Station dots along the route
        stops.forEach(s=>{
          if(!s.stationinfo?.locationY)return;
          L.circleMarker(
            [parseFloat(s.stationinfo.locationY),parseFloat(s.stationinfo.locationX)],
            {radius:3,fillColor:'#22C55E',color:'#fff',weight:1,fillOpacity:0.6}
          ).addTo(igTrains).bindPopup(`<strong>${esc(s.station||s.stationinfo?.standardname||'')}</strong><br>Platform ${esc(s.platform||'?')}`);
        });

      }catch(e){console.warn('[TRAIN] Vehicle fetch failed:',vid,e);}
    }

    intelCounts.trains=count;
    if(document.getElementById('layerTrains')?.checked&&!window.mapInstance.hasLayer(igTrains))igTrains.addTo(window.mapInstance);
    updateIntelCounter();
    console.log('[TRAIN] '+count+' trains tracked with full routes');
  }catch(e){console.warn('[TRAIN] Trains fetch failed:',e);}
}

/* === UNHCR Refugee Data (live API with fallback) === */
async function fetchRefugeeData(){
  if(!igRefugees||!window.mapInstance)return;
  try{
    const r=await fetch('https://api.unhcr.org/population/v1/population/?limit=30&year=2024&page=1&cf_type=ISO');
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    igRefugees.clearLayers();

    // Aggregate by country of origin
    const byOrigin={};
    (d.items||[]).forEach(item=>{
      const iso=item.coo_iso||item.coo;
      if(!iso)return;
      if(!byOrigin[iso])byOrigin[iso]={name:item.coo_name||iso,refugees:0,asylum:0,idps:0,total:0};
      byOrigin[iso].refugees+=parseInt(item.refugees||0);
      byOrigin[iso].asylum+=parseInt(item.asylum_seekers||0);
      byOrigin[iso].idps+=parseInt(item.idps||0);
      byOrigin[iso].total+=parseInt(item.refugees||0)+parseInt(item.asylum_seekers||0)+parseInt(item.idps||0);
    });

    // Country centroids for mapping
    const centroids={
      'AFG':[34.5,69.2],'SYR':[35.0,38.0],'UKR':[49.0,32.0],'VEN':[8.0,-66.0],
      'SSD':[7.0,30.0],'MMR':[19.8,96.2],'SOM':[5.0,46.0],'COD':[0.0,25.0],
      'SDN':[15.5,32.5],'ERI':[15.3,39.0],'BDI':[3.5,29.5],'CAF':[7.0,21.0],
      'NGA':[9.0,8.0],'IRQ':[33.0,44.0],'COL':[4.6,-74.1],'HTI':[19.0,-72.0],

      'LBY':[27.0,17.0],'YEM':[15.3,44.2],'PSE':[31.9,35.2],'TUR':[39.0,35.0],
      'BGD':[23.7,90.4],'KEN':[-0.5,37.8]
    };

    let count=0;
    Object.entries(byOrigin).sort((a,b)=>b[1].total-a[1].total).slice(0,25).forEach(([iso,data])=>{
      const coords=centroids[iso];
      if(!coords)return;
      const totalK=data.total>1000000?(data.total/1000000).toFixed(1)+'M':(data.total/1000).toFixed(0)+'K';

      L.circleMarker(coords,{
        radius:radius,fillColor:'#F97316',color:'#FBBF24',weight:1.5,fillOpacity:0.25
      }).addTo(igRefugees).bindPopup(
        `<strong style="color:#F97316;font-size:.9rem">${esc(data.name)}</strong><br>`+
        `<div style="margin-top:.3rem;font-size:.76rem;line-height:1.6">`+
        `<span style="color:var(--accent)">TOTAL DISPLACED:</span> <strong>${esc(totalK)}</strong><br>`+
        `<span style="color:var(--accent)">REFUGEES:</span> ${data.refugees.toLocaleString()}<br>`+
        `<span style="color:var(--accent)">ASYLUM SEEKERS:</span> ${data.asylum.toLocaleString()}<br>`+

/* === Weather Radar (RainViewer) === */
async function fetchRadarLayer(){
if(!window.mapInstance)return;
try{
const r=await fetch('https://api.rainviewer.com/public/weather-maps.json');
if(!r.ok)throw new Error('HTTP '+r.status);
const d=await r.json();
if(igRadar)window.mapInstance.removeLayer(igRadar);
const past=d.radar?.past;
if(!past||!past.length)return;
const latest=past[past.length-1];
igRadar=L.tileLayer(d.host+latest.path+'/256/{z}/{x}/{y}/2/1_1.png',{opacity:0.4,zIndex:10,attribution:'RainViewer'});
if(document.getElementById('layerRadar')?.checked)igRadar.addTo(window.mapInstance);
}catch(e){console.warn('Radar fetch failed:',e);}
}

/* ===== ZULU CLOCK ===== */
function updateZuluClock(){
  const now=new Date();
  const months=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const d=String(now.getUTCDate()).padStart(2,'0');
  const m=months[now.getUTCMonth()];
  const y=now.getUTCFullYear();
  const h=String(now.getUTCHours()).padStart(2,'0');
  const min=String(now.getUTCMinutes()).padStart(2,'0');
  const s=String(now.getUTCSeconds()).padStart(2,'0');
  const zuluEl=document.getElementById('zuluTime');
  const localEl=document.getElementById('localTime');
  if(zuluEl)zuluEl.textContent=`${d}${m}${y} ${h}:${min}:${s}Z`;
  if(localEl)localEl.textContent=`LOCAL ${now.toLocaleTimeString('en-GB')}`;
}

function getBearing(lat1,lon1,lat2,lon2){
  const dLon=(lon2-lon1)*Math.PI/180;
  const y=Math.sin(dLon)*Math.cos(lat2*Math.PI/180);
  const x=Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180)-Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos(dLon);
  return((Math.atan2(y,x)*180/Math.PI)+360)%360;
}

  const txt=`SPOTREP (SALUTE)\nS - SIZE:      ${document.getElementById('spotS')?.value||''}\nA - ACTIVITY:  ${document.getElementById('spotA')?.value||''}\nL - LOCATION:  ${document.getElementById('spotL')?.value||''}\nU - UNIT/UNIF: ${document.getElementById('spotU')?.value||''}\nT - TIME:      ${document.getElementById('spotT')?.value||''}\nE - EQUIPMENT: ${document.getElementById('spotE')?.value||''}`;
  navigator.clipboard.writeText(txt);
  showToast('SPOTREP copied','success');
}

/* ===== GLOBAL EVENTS ===== */
document.addEventListener('DOMContentLoaded',()=>{
// Theme — force dark as military default
const savedTheme=localStorage.getItem('bf_theme')||'dark';
document.documentElement.dataset.theme=savedTheme;
document.getElementById('themeBtn').innerHTML=savedTheme==='dark'?'&#9788;':'&#9790;';
// Zulu clock
setInterval(updateZuluClock,1000);
updateZuluClock();
// NATO alert state
const savedAlert=parseInt(localStorage.getItem('dur_alert')||'0');
setAlertState(isNaN(savedAlert)?0:Math.min(Math.max(savedAlert,0),4));
// Initial connection status
{const dot=document.getElementById('connDot');const lbl=document.getElementById('connLabel');if(dot){dot.className='conn-dot '+(navigator.onLine?'online':'offline')}if(lbl){lbl.textContent=navigator.onLine?'Online':'Offline'}}
// Session
checkSession();
// Modal close on overlay click
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});
// Keyboard
document.addEventListener('keydown',e=>{
if(e.key==='Escape'){closeModal();closeDetail()}
if(e.key==='n'&&!e.ctrlKey&&!e.metaKey&&!['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)){
e.preventDefault();
if(currentPage==='personnel')openPersonnelModal();
else if(currentPage==='deployments')openDeploymentModal();
}
});
// Global search
document.getElementById('globalSearch').addEventListener('input',e=>{
performGlobalSearch(e.target.value);
});
document.getElementById('globalSearch').addEventListener('focus',e=>{if(e.target.value.length>=2)performGlobalSearch(e.target.value)});
// Close dropdowns on outside click
document.addEventListener('click',e=>{
if(!e.target.closest('.search-wrap'))document.getElementById('searchResults')?.classList.remove('active');
if(!e.target.closest('.notif-wrap'))document.getElementById('notifDropdown')?.classList.remove('active');
});
});
// PWA
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{})}
</script>
